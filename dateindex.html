<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Date Range Picker</title>
  <link rel="stylesheet" href="datestyle.css" />
</head>
<body>
  <div class="date-range-picker">
    <input type="text" readonly id="start-date" placeholder="Start Date" />
    <span>—</span>
    <input type="text" readonly id="end-date" placeholder="End Date" />
    <div class="calendar hidden" id="calendar"></div>
  </div>

  <script src="datescript.js"></script>
</body>
</html>
